<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="robots" content="noindex, nofollow"/>
<title>특이사항 보고서</title>
<style>
  :root{
    --bg:#f4f2ec; --card:#ffffff; --ink:#2b2a27; --ink2:#6b6862; --ink3:#9b978f;
    --border:#e0ddd5; --accent:#4a6fa5; --danger:#E24B4A;
    --bg-danger:#fbeceb; --bg-info:#eaf1fa;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;}
  .wrap{max-width:1140px;margin:0 auto;padding:20px 16px 60px;}
  /* ----- 로그인 ----- */
  #gate{min-height:80vh;display:flex;align-items:center;justify-content:center;}
  .gatecard{background:var(--card);border:1px solid var(--border);border-radius:16px;
    padding:34px 30px;width:100%;max-width:340px;text-align:center;
    box-shadow:0 2px 14px rgba(0,0,0,.05);}
  .lock{font-size:30px;margin-bottom:8px;}
  .gatecard h1{font-size:17px;margin:0 0 4px;font-weight:700;}
  .gatecard p{font-size:12.5px;color:var(--ink2);margin:0 0 22px;}
  #code{width:100%;font-size:22px;letter-spacing:.32em;text-align:center;
    padding:12px 10px;border:1.4px solid var(--border);border-radius:10px;outline:none;
    font-family:inherit;background:#fcfbf9;}
  #code:focus{border-color:var(--accent);}
  button#enter{margin-top:14px;width:100%;padding:12px;font-size:15px;font-weight:600;
    color:#fff;background:var(--accent);border:none;border-radius:10px;cursor:pointer;}
  button#enter:active{opacity:.85;}
  button#enter:disabled{opacity:.5;cursor:default;}
  #err{color:var(--danger);font-size:12.5px;margin-top:12px;min-height:16px;}
  /* ----- 본문 ----- */
  #app{display:none;}
  .topbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .topbar h1{font-size:16px;margin:0;font-weight:700;}
  .spacer{flex:1;}
  /* ----- 일/주/월 탭 ----- */
  .tabs{display:inline-flex;gap:4px;background:#ece9e1;border-radius:10px;padding:3px;}
  .tab{font-size:13px;padding:6px 16px;border:none;border-radius:8px;background:transparent;
    color:var(--ink2);cursor:pointer;font-family:inherit;font-weight:500;}
  .tab.active{background:#fff;color:var(--accent);font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.08);}
  .tab:disabled{opacity:.38;cursor:default;}
  select#picker{font-size:13px;padding:7px 10px;border:1px solid var(--border);
    border-radius:8px;background:#fff;font-family:inherit;color:var(--ink);max-width:220px;}
  .btn-ghost{font-size:12px;padding:7px 11px;border:1px solid var(--border);
    border-radius:8px;background:#fff;color:var(--ink2);cursor:pointer;font-family:inherit;}
  #report{background:var(--card);border:1px solid var(--border);border-radius:14px;
    padding:6px 22px 22px;
    --color-text-primary:var(--ink);--color-text-secondary:var(--ink2);
    --color-text-tertiary:var(--ink3);--color-background-danger:var(--bg-danger);
    --color-background-info:var(--bg-info);}
  .muted{color:var(--ink3);font-size:12px;text-align:center;padding:30px;}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}
</style>
</head>
<body>
<div class="wrap">

  <!-- 진입코드 게이트 -->
  <div id="gate">
    <form class="gatecard" id="gateform">
      <div class="lock">🔒</div>
      <h1>내포소망주간보호 특이사항 보고서</h1>
      <p>열람하려면 진입코드를 입력하세요</p>
      <input id="code" inputmode="text" autocomplete="off" autofocus placeholder="••••"/>
      <button id="enter" type="submit">열기</button>
      <div id="err"></div>
    </form>
  </div>

  <!-- 보고서 본문 -->
  <div id="app">
    <div class="topbar">
      <h1>특이사항 보고서</h1>
      <div class="tabs" id="tabs" role="tablist">
        <button class="tab" data-cat="day"   role="tab">일간</button>
        <button class="tab" data-cat="week"  role="tab">주간</button>
        <button class="tab" data-cat="month" role="tab">월간</button>
      </div>
      <div class="spacer"></div>
      <select id="picker" aria-label="보고서 선택"></select>
      <button class="btn-ghost" id="lock">잠그기</button>
    </div>
    <div id="report"><div class="muted">불러오는 중…</div></div>
  </div>

</div>

<script>
const enc = new TextEncoder();
const dec = new TextDecoder();
let PASS = null;           // 입력된 진입코드 (세션 메모리에만 유지)
let manifest = [];
let curCat = 'day';

const b64ToBytes = (b64) => Uint8Array.from(atob(b64), c => c.charCodeAt(0));

// manifest 키 접두로 분류: W=주간, M=월간, 8자리 숫자=일간
function catOf(key){
  if(/^W/.test(key)) return 'week';
  if(/^M/.test(key)) return 'month';
  return 'day';
}

async function deriveKey(passcode, saltBytes, iter){
  const baseKey = await crypto.subtle.importKey('raw', enc.encode(passcode),
    {name:'PBKDF2'}, false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:saltBytes, iterations:iter, hash:'SHA-256'},
    baseKey, {name:'AES-GCM', length:256}, false, ['decrypt']);
}

async function decryptPayload(payload, passcode){
  const salt = b64ToBytes(payload.salt);
  const iv = b64ToBytes(payload.iv);
  const ct = b64ToBytes(payload.ct);
  const key = await deriveKey(passcode, salt, payload.iter || 100000);
  const plainBuf = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
  return dec.decode(plainBuf);
}

async function fetchJSON(url){
  const r = await fetch(url, {cache:'no-store'});
  if(!r.ok) throw new Error('not found');
  return r.json();
}

// 진입코드 제출
document.getElementById('gateform').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const code = document.getElementById('code').value.trim();
  const errEl = document.getElementById('err');
  const btn = document.getElementById('enter');
  errEl.textContent=''; btn.disabled=true; btn.textContent='확인 중…';
  try{
    manifest = (await fetchJSON('manifest.json')).reports || [];
    if(!manifest.length){ throw {nodata:true}; }
    // 가장 최신 보고서로 코드 검증
    const latest = await fetchJSON(manifest[0].key + '.json');
    await decryptPayload(latest, code);    // 틀리면 여기서 예외
    PASS = code;
    enterApp();
  }catch(ex){
    if(ex && ex.nodata){ errEl.textContent='아직 등록된 보고서가 없습니다.'; }
    else { errEl.textContent='진입코드가 올바르지 않습니다.'; }
    btn.disabled=false; btn.textContent='열기';
    document.getElementById('code').select();
  }
});

function enterApp(){
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='block';

  // 카테고리별 가용 여부로 탭 활성/비활성
  const avail = {day:false, week:false, month:false};
  manifest.forEach(r=>{ avail[catOf(r.key)] = true; });
  const tabBtns = [...document.querySelectorAll('.tab')];
  tabBtns.forEach(b=>{
    const c = b.dataset.cat;
    b.disabled = !avail[c];
    b.addEventListener('click', ()=>{ if(!b.disabled) selectTab(c); });
  });

  // 기본 탭: 일간 → 없으면 주간 → 월간 순
  const def = avail.day ? 'day' : (avail.week ? 'week' : 'month');
  selectTab(def);
}

function selectTab(cat){
  curCat = cat;
  document.querySelectorAll('.tab').forEach(b=>{
    b.classList.toggle('active', b.dataset.cat===cat);
  });
  const picker = document.getElementById('picker');
  const list = manifest.filter(r=>catOf(r.key)===cat);  // manifest는 최신순 정렬
  picker.innerHTML = list.map(r=>`<option value="${r.key}">${r.date}</option>`).join('');
  if(list.length){
    picker.value = list[0].key;
    loadSelected();
  } else {
    _loadSeq++; // 비행 중인 이전 요청이 도착해 이 빈 메시지를 덮어쓰지 못하도록 무효화
    document.getElementById('report').innerHTML =
      '<div class="muted">이 분류의 보고서가 아직 없습니다.</div>';
  }
  picker.onchange = loadSelected;
}

let _loadSeq = 0; // 빠른 탭/날짜 전환 시 늦게 도착한 이전 요청이 화면을 덮어쓰지 않도록 순서 토큰
async function loadSelected(){
  const key = document.getElementById('picker').value;
  const rep = document.getElementById('report');
  if(!key){ return; }
  const seq = ++_loadSeq;
  rep.innerHTML = '<div class="muted">불러오는 중…</div>';
  try{
    const payload = await fetchJSON(key + '.json');
    const html = await decryptPayload(payload, PASS);
    if(seq !== _loadSeq) return;
    rep.innerHTML = html;
  }catch(ex){
    if(seq !== _loadSeq) return;
    rep.innerHTML = '<div class="muted">보고서를 불러오지 못했습니다.</div>';
  }
}

// 잠그기
document.getElementById('lock').addEventListener('click', ()=>{ location.reload(); });
</script>
</body>
</html>
